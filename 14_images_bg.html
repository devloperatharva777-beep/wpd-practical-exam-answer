<!-- Question: Insert images on web page using various attributes and set image as background. -->
<!DOCTYPE html>
<html>
<head>
    <title>Image Background and Foreground</title>


    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; }
        img { border: 3px solid #333; margin: 10px; max-width: 250px; }
        h1, h2, h3 { color: #2c3e50; border-bottom: 2px solid #2c3e50; display: inline-block; }
    </style>
</head>
<body background="https://via.placeholder.com/1000/cccccc" style="background-attachment: fixed;">
    <h2>Image Background and Foreground</h2>
    
    <p>This is a foreground image:</p>
    <img src="https://via.placeholder.com/200" alt="Sample Image" border="2">

    <p>The background of this page is also an image.</p>
</body>
</html>
