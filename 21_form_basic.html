<!-- Question: Create a webpage that provides a form for filling information. The webpage must contain following elements: • Textbox • Radio buttons • Checkboxes -->
<!DOCTYPE html>
<html>
<head>
    <title>Basic Form Elements</title>
</head>
<body>
    <h2>Student Information Form</h2>
    <form>
        Name: <input type="text" name="student_name"><br><br>
        
        Gender:<br>
        <input type="radio" name="gender" value="male"> Male<br>
        <input type="radio" name="gender" value="female"> Female<br><br>
        
        Hobbies:<br>
        <input type="checkbox" name="hobby" value="reading"> Reading<br>
        <input type="checkbox" name="hobby" value="writing"> Writing<br>
        <input type="checkbox" name="hobby" value="coding"> Coding<br>
    </form>
</body>
</html>
