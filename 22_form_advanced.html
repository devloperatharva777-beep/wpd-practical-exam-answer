<!-- Question: Create a webpage that provides a form for filling information. The webpage must contain following elements: • Buttons (Submit/Reset) • Text area • Textbox for passwords -->
<!DOCTYPE html>
<html>
<head>
    <title>Advanced Form Elements</title>


    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; }
        form { border: 1px solid #777; padding: 20px; background: white; border-radius: 5px; }
        input[type='text'], select { width: 90%; padding: 5px; margin: 10px 0; }
        h1, h2, h3 { color: #2c3e50; border-bottom: 2px solid #2c3e50; display: inline-block; }
    </style>
</head>
<body>
    <h2>Advanced Information Form</h2>
    <form>
        Password: <input type="password" name="pass"><br><br>
        
        Comments:<br>
        <textarea name="comments" rows="5" cols="30"></textarea><br><br>
        
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
