<!-- Question: Create a webpage that provides a form for filling information. The webpage must contain following elements: • Buttons (Submit/Reset) • Text area • Textbox for passwords -->
<!DOCTYPE html>
<html>
<head>
    <title>Advanced Form Elements</title>
</head>
<body>
    <h2>Advanced Information Form</h2>
    <form>
        Password: <input type="password" name="pass"><br><br>
        
        Comments:<br>
        <textarea name="comments" rows="5" cols="30"></textarea><br><br>
        
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
