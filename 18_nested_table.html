<!-- Question: Create table within table and insert images in tables. -->
<!DOCTYPE html>
<html>
<head>
    <title>Nested Table and Images</title>


    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid black; padding: 10px; text-align: left; }
        th { background-color: #ddd; }
        img { border: 3px solid #333; margin: 10px; max-width: 250px; }
        h1, h2, h3 { color: #2c3e50; border-bottom: 2px solid #2c3e50; display: inline-block; }
    </style>
</head>
<body>
    <h2>Nested Table and Images in Table</h2>
    <table border="1" width="50%">
        <tr>
            <th>Main Cell 1</th>
            <th>Main Cell 2</th>
        </tr>
        <tr>
            <td>
                <table border="1">
                    <tr><td>Nested A</td></tr>
                    <tr><td>Nested B</td></tr>
                </table>
            </td>
            <td>
                <img src="https://via.placeholder.com/100" alt="Image in table">
            </td>
        </tr>
    </table>
</body>
</html>
