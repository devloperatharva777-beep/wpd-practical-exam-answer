<!-- Question: Design a web page for implementing ordered list and unordered list. -->
<!DOCTYPE html>
<html>
<head>
    <title>Lists Demo</title>


    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; }
        ul { list-style-type: circle; color: darkblue; }
        ol { color: darkgreen; }
        h1, h2, h3 { color: #2c3e50; border-bottom: 2px solid #2c3e50; display: inline-block; }
    </style>
</head>
<body>
    <h2>Ordered List</h2>
    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

    <h2>Unordered List</h2>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Orange</li>
    </ul>
</body>
</html>
