<!-- Question: Create a web page to insert a border property in html statements. -->
<!DOCTYPE html>
<html>
<head>
    <title>Border Properties</title>
</head>
<body>
    <h1 style="border: 2px solid black;">H1 with a solid black border</h1>
    <p style="border: 1px dotted red;">Paragraph with a dotted red border.</p>
    <div style="border: 5px double blue; padding: 10px;">
        Div with a double blue border.
    </div>
</body>
</html>
