<!-- Question: Create table within table and also insert an image within the data elements of the table. -->
<!DOCTYPE html>
<html>
<head>
    <title>Nested Table within Data Elements</title>
</head>
<body>
    <h2>Table within Table and Image in Data Elements</h2>
    <table border="1" width="80%">
        <tr>
            <th>Category</th>
            <th>Details</th>
        </tr>
        <tr>
            <td>Technology</td>
            <td>
                <table border="1">
                    <tr>
                        <td><img src="https://via.placeholder.com/50" alt="icon"></td>
                        <td>HTML5</td>
                    </tr>
                    <tr>
                        <td><img src="https://via.placeholder.com/50" alt="icon"></td>
                        <td>CSS3</td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
