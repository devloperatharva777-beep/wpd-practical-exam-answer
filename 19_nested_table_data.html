<!-- Question: Create table within table and also insert an image within the data elements of the table. -->
<!DOCTYPE html>
<html>
<head>
    <title>Nested Table within Data Elements</title>


    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid black; padding: 10px; text-align: left; }
        th { background-color: #ddd; }
        img { border: 3px solid #333; margin: 10px; max-width: 250px; }
        h1, h2, h3 { color: #2c3e50; border-bottom: 2px solid #2c3e50; display: inline-block; }
    </style>
</head>
<body>
    <h2>Table within Table and Image in Data Elements</h2>
    <table border="1" width="80%">
        <tr>
            <th>Category</th>
            <th>Details</th>
        </tr>
        <tr>
            <td>Technology</td>
            <td>
                <table border="1">
                    <tr>
                        <td><img src="https://via.placeholder.com/50" alt="icon"></td>
                        <td>HTML5</td>
                    </tr>
                    <tr>
                        <td><img src="https://via.placeholder.com/50" alt="icon"></td>
                        <td>CSS3</td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
