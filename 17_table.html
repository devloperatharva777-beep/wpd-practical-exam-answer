<!-- Question: Create a web page to implement Table. -->
<!DOCTYPE html>
<html>
<head>
    <title>Table Demo</title>


    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid black; padding: 10px; text-align: left; }
        th { background-color: #ddd; }
        h1, h2, h3 { color: #2c3e50; border-bottom: 2px solid #2c3e50; display: inline-block; }
    </style>
</head>
<body>
    <h2>Basic Table</h2>
    <table border="1">
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>101</td>
            <td>John Doe</td>
            <td>85</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Jane Smith</td>
            <td>90</td>
        </tr>
    </table>
</body>
</html>
