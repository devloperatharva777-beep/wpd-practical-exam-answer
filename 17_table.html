<!-- Question: Create a web page to implement Table. -->
<!DOCTYPE html>
<html>
<head>
    <title>Table Demo</title>
</head>
<body>
    <h2>Basic Table</h2>
    <table border="1">
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>101</td>
            <td>John Doe</td>
            <td>85</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Jane Smith</td>
            <td>90</td>
        </tr>
    </table>
</body>
</html>
