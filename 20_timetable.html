<!-- Question: Create a webpage that displays first year timetable. Make effective use of rowspan and colspan attributes. Make use of <th> tag. -->
<!DOCTYPE html>
<html>
<head>
    <title>First Year Timetable</title>


    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid black; padding: 10px; text-align: left; }
        th { background-color: #ddd; }
        h1, h2, h3 { color: #2c3e50; border-bottom: 2px solid #2c3e50; display: inline-block; }
    </style>
</head>
<body>
    <center>
        <h2>First Year Computer Diploma Timetable</h2>
        <table border="1" width="90%">
            <tr>
                <th>Time</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
            </tr>
            <tr>
                <th>9:00 - 10:00</th>
                <td>WPD</td>
                <td>MATHS</td>
                <td>WPD</td>
                <td>ENG</td>
                <td>PHY</td>
            </tr>
            <tr>
                <th>10:00 - 11:00</th>
                <td>MATHS</td>
                <td>WPD</td>
                <td>PHY</td>
                <td>WPD</td>
                <td>ENG</td>
            </tr>
            <tr>
                <th>11:00 - 11:15</th>
                <th colspan="5">BREAK</th>
            </tr>
            <tr>
                <th>11:15 - 1:15</th>
                <td>WPD LAB</td>
                <td rowspan="2">PROJECT</td>
                <td>ENG LAB</td>
                <td>PHY LAB</td>
                <td>WPD LAB</td>
            </tr>
            <tr>
                <th>1:15 - 2:00</th>
                <th>LUNCH</th>
                <th>LUNCH</th>
                <th>LUNCH</th>
                <th>LUNCH</th>
            </tr>
        </table>
    </center>
</body>
</html>
