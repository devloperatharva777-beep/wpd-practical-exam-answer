<!-- Question: Create a webpage which includes photos and align with the ALT property on the left, right, and center. -->
<!DOCTYPE html>
<html>
<head>
    <title>Image Alignment and Links</title>
</head>
<body>
    <h2>Image Alignment</h2>
    
    <p align="left">
        <a href="https://via.placeholder.com/150">
            <img src="https://via.placeholder.com/150" alt="Left Aligned Image" align="left">
        </a>
        This image is aligned to the LEFT. The text flows around it.
    </p>
    <br clear="all">

    <p align="right">
        <a href="https://via.placeholder.com/150">
            <img src="https://via.placeholder.com/150" alt="Right Aligned Image" align="right">
        </a>
        This image is aligned to the RIGHT. The text flows around it.
    </p>
    <br clear="all">

    <center>
        <a href="https://via.placeholder.com/150">
            <img src="https://via.placeholder.com/150" alt="Center Aligned Image">
        </a>
        <p>This image is Centered using center tag.</p>
    </center>

</body>
</html>
