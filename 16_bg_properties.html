<!-- Question: Create a web page with background properties: Set the background color of the page to line n, Set border to h1 tag, Set background image to a page and to a paragraph. -->
<!DOCTYPE html>
<html>
<head>
    <title>Background Properties</title>
</head>
<body bgcolor="lightblue" style="background-image: url('https://via.placeholder.com/100'); background-repeat: no-repeat;">
    
    <h1 style="border: 3px solid navy;">H1 with Border</h1>

    <p style="background-image: url('https://via.placeholder.com/50'); background-color: yellow;">
        This paragraph has a background image and a yellow background color. 
        It demonstrates setting background properties to specific elements.
    </p>

    <p>The page has a light blue background color and a small background image at the top left.</p>

</body>
</html>
