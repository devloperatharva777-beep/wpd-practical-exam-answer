<!-- Question: Create a webpage containing any image and add a hyperlink to another webpage. Use width and height property for an image. -->
<!DOCTYPE html>
<html>

<head>
    <title>Image Hyperlink and Size</title>


    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; }
        a { color: blue; text-decoration: none; }
        a:hover { color: red; text-decoration: underline; }
        img { border: 3px solid #333; margin: 10px; max-width: 250px; }
        h1, h2, h3 { color: #2c3e50; border-bottom: 2px solid #2c3e50; display: inline-block; }
    </style>
</head>

<body>
    <h2>Image Hyperlink and Size</h2>

    <p>Image with a hyperlink and specific dimensions (300x200):</p>
    <a href="1_structure.html">
        <img src="https://via.placeholder.com/300x200" alt="Link Image" width="300" height="200">
    </a>
</body>

</html>
