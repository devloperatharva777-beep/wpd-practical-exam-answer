<!-- Question: Create web page to link: 1. An external page of different web site 2. To an e-mail ID. -->
<!DOCTYPE html>
<html>
<head>
    <title>External and Email Links</title>


    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; }
        a { color: blue; text-decoration: none; }
        a:hover { color: red; text-decoration: underline; }
        h1, h2, h3 { color: #2c3e50; border-bottom: 2px solid #2c3e50; display: inline-block; }
    </style>
</head>
<body>
    <h2>External and Email Links</h2>
    
    <p>1. <a href="http://www.google.com" target="_blank">Link to an external page (Google)</a></p>
    
    <p>2. <a href="mailto:example@gmail.com">Link to an e-mail ID</a></p>
</body>
</html>
