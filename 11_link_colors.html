<!-- Question: Demonstrate to change colors of links on web page. -->
<!DOCTYPE html>
<html>
<head>
    <title>Link Colors</title>


    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; }
        a { color: blue; text-decoration: none; }
        a:hover { color: red; text-decoration: underline; }
        h1, h2, h3 { color: #2c3e50; border-bottom: 2px solid #2c3e50; display: inline-block; }
    </style>
</head>
<body link="red" vlink="green" alink="yellow">
    <h2>Link Colors Demonstration</h2>
    <p>
        <a href="https://www.google.com">This is a link to Google.</a>
    </p>
    <p>The link color is red, visited is green, and active is yellow.</p>
</body>
</html>
