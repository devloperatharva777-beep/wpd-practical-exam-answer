<!-- Question: Create a web page for displaying a paragraph using block level tags, HR tags. -->
<!DOCTYPE html>
<html>
<head>
    <title>Block Level Tags</title>
</head>
<body>
    <div>
        <p>This paragraph is inside a DIV, which is a block-level tag.</p>
    </div>
    <hr>
    <div>
        <p>Another block-level element. Block-level elements always start on a new line and take up the full width available.</p>
    </div>
    <hr>
</body>
</html>
